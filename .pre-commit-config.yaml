repos:
  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: isort
        language: system
        types: [python]

      - id: black
        name: black
        entry: black
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest-discovery
        name: pytest-discovery
        entry: python -m pytest tests/test_initial.py -n 0
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-doctest
        name: pytest-doctest
        entry: pytest --ignore=tests -n 0
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-markguard
        name: pytest-markguard
        entry: scripts/check-test-marks.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-unit
        name: pytest-unit
        entry: python -m pytest tests/unit -n 8 -m "quick and not slow"
        language: system
        pass_filenames: false
        always_run: true

      - id: pytest-reference
        name: pytest-reference
        entry: python -m pytest tests/reference -n 8
        language: system
        pass_filenames: false
        always_run: true
